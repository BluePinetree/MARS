services:
  backend:
    build:
      context: ./crewai_prototype
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./crewai_prototype/.env
    volumes:
      - ./crewai_prototype/outputs:/app/outputs
      - ./crewai_prototype/runs:/app/runs
    restart: unless-stopped

  frontend:
    build:
      context: ./research_system_ui
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://backend:8000
      - PORT=5173
    depends_on:
      - backend
    restart: unless-stopped
